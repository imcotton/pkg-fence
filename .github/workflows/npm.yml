name: Publish NPM

on: push

jobs:

  publish:

    runs-on: ubuntu-latest
    timeout-minutes: 3

    permissions:
      contents: read
      id-token: write

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: v20
          registry-url: https://registry.npmjs.org/

      - name: Prebuild
        run: |-

          VER=$(jq -r '.version' deno.json)

          cat tmp-package.json | sed "s/0.0.0-VERSION/$VER/" > package.json

          npm install --no-{fund,save,lock} typescript@5.8.1-rc @types/node@18

      - name: Build by tsc
        run: npx tsc ./src/**/*.ts
                     --strict
                     --outDir ./dist
                     --target es2022
                     --module node16
                     --moduleResolution node16
                     --erasableSyntaxOnly
                     --rewriteRelativeImportExtensions


